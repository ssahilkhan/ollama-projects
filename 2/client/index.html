<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Inquiry Chatbot</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="auth-modal" class="modal">
    <div class="modal-content">
      <h2 id="auth-title">Login</h2>
      <form id="auth-form">
        <input type="text" id="auth-name" placeholder="Name" style="display: none;">
        <input type="email" id="auth-email" placeholder="Email" required>
        <input type="password" id="auth-password" placeholder="Password" required>
        <button type="submit" id="auth-submit">Login</button>
      </form>
      <p id="auth-toggle">Don't have an account? <a href="#" id="auth-link">Register</a></p>
      <p id="auth-error" style="color: red; display: none;"></p>
    </div>
  </div>

  <div id="chat-wrapper" class="container" style="display: none;">
    <header>
      <div class="header-content">
        <div>
          <h1>Student Inquiry Chatbot</h1>
          <p>Ask questions about courses, admissions, schedules, and more</p>
        </div>
        <button id="logout-btn">Logout</button>
      </div>
    </header>

    <div class="chat-container">
      <div id="chat-messages" class="chat-messages"></div>
      <div class="chat-input">
        <input 
          type="text" 
          id="user-input" 
          placeholder="Type your question here..."
          autocomplete="off"
        >
        <button id="send-btn">Send</button>
      </div>
    </div>

    <div class="status-bar">
      <span id="connection-status">Connecting...</span>
      <span id="user-info"></span>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    const modal = document.getElementById('auth-modal');
    const chatWrapper = document.getElementById('chat-wrapper');
    const authForm = document.getElementById('auth-form');
    const authTitle = document.getElementById('auth-title');
    const authName = document.getElementById('auth-name');
    const authToggle = document.getElementById('auth-toggle');
    const authError = document.getElementById('auth-error');
    const logoutBtn = document.getElementById('logout-btn');
    const userInfo = document.getElementById('user-info');

    let isRegistering = false;

    function showAuth() {
      modal.style.display = 'flex';
      chatWrapper.style.display = 'none';
    }

    function showChat() {
      modal.style.display = 'none';
      chatWrapper.style.display = 'block';
      updateUserInfo();
    }

    function updateUserInfo() {
      const user = window.getUser();
      if (user) {
        userInfo.textContent = `Logged in as: ${user.name}`;
      }
    }

    function toggleAuthMode() {
      isRegistering = !isRegistering;
      authTitle.textContent = isRegistering ? 'Register' : 'Login';
      authName.style.display = isRegistering ? 'block' : 'none';
      document.getElementById('auth-submit').textContent = isRegistering ? 'Register' : 'Login';
      authToggle.innerHTML = isRegistering 
        ? 'Have an account? <a href="#" id="auth-link">Login</a>'
        : 'Don\'t have an account? <a href="#" id="auth-link">Register</a>';
      document.getElementById('auth-link').addEventListener('click', (e) => {
        e.preventDefault();
        toggleAuthMode();
      });
      authError.style.display = 'none';
    }

    authForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('auth-email').value;
      const password = document.getElementById('auth-password').value;
      const name = document.getElementById('auth-name').value;

      let result;
      if (isRegistering) {
        result = await window.registerUser(name, email, password);
      } else {
        result = await window.loginUser(email, password);
      }

      if (result.success) {
        showChat();
      } else {
        authError.textContent = result.message;
        authError.style.display = 'block';
      }
    });

    document.getElementById('auth-link').addEventListener('click', (e) => {
      e.preventDefault();
      toggleAuthMode();
    });

    logoutBtn.addEventListener('click', () => {
      localStorage.removeItem('token');
      location.reload();
    });

    if (window.getToken()) {
      showChat();
    } else {
      showAuth();
    }
  </script>
</body>
</html>
